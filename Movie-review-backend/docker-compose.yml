# 전사 흐름: "도커로 데이터베이스(MySQL)만 띄운다"
# 백엔드 서버는 로컬(python manage.py runserver)로 돌리고, 여기 MySQL에 127.0.0.1로 접속.
#
#   docker compose up -d        # MySQL 띄우기
#   docker compose down         # 내리기
services:
  mysqldb:
    image: mysql:8.0
    container_name: mysqldb
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: "mydatabase"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
